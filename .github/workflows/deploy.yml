name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the Pages config (set by the user in Settings → Pages) and
      # exposes the base_path the site will be served from (e.g.
      # "/<repo>" for project pages, "" for custom domains). Pages must
      # be enabled manually first — see this repo's README, Step 1.
      - id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: boreddocs check
      # --base-url is auto-set from the Pages config above so static
      # assets and internal links resolve correctly under any deploy
      # URL (apex, subpath, or custom domain).
      - run: boreddocs build --base-url "${{ steps.pages.outputs.base_path }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
