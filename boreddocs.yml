schema_version: 1

# ----------------------------------------------------------------------
# EDIT ME — replace the placeholder values with your district's info.
# Anything inside quotes is what visitors will see on the website.
# ----------------------------------------------------------------------
site:
  name: "Your School District"
  short_name: "YSD"
  # `base_url` is set automatically by the deploy workflow based on
  # where GitHub Pages is publishing (project subpath, apex domain,
  # or custom domain). You normally don't need to touch this.
  # If you're using a custom domain, set `url` to the full origin
  # (e.g. https://boards.yourdistrict.org) — it's used in sitemap.xml.
  url: ""
  base_url: ""
  description: "Board agendas, minutes, and policies for Your School District."
  repo_url: https://github.com/REPLACE_ME/REPLACE_ME
  edit_base_url: https://github.com/REPLACE_ME/REPLACE_ME/edit/main

nav:
  - { text: About Us, url: "/" }
  - { text: Meetings, url: "/meetings/" }
  - { text: Policies, url: "/policies/" }

footer:
  strategic_plan_goals:
    - Success for All
    - Safe, Healthy, and Caring Environment
    - Effective and Efficient Operations
  mission_statement: >
    Replace this with your district's mission statement.
  vision_statement: >
    Replace this with your district's vision statement.
  we_value:
    - Students
    - Trust, Kindness, and Respect

theme:
  name: default

content:
  meetings_dir: content/meetings
  policies_dir: content/policies
  data_dir: data

output_dir: _site
